<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BERSAHAJA — Login</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#070e1b;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#0c1625;border:1px solid #1b2e4a;border-radius:20px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,0.5)}
  .logo{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:28px}
  .logo img{width:80px;height:80px;object-fit:contain;filter:drop-shadow(0 0 12px rgba(255,255,255,.4))}
  .logo-text{font-size:20px;font-weight:700;color:#fff;letter-spacing:.02em}
  .logo-sub{font-size:10px;color:#3a5575;letter-spacing:.04em}
  h2{font-size:15px;font-weight:600;color:#dde8f8;text-align:center;margin-bottom:6px}
  .sub{font-size:11px;color:#3a5575;text-align:center;margin-bottom:24px}
  .field{margin-bottom:14px}
  label{display:block;font-size:10px;font-weight:600;color:#3a5575;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
  input{width:100%;background:#111e33;border:1px solid #1b2e4a;color:#dde8f8;font-size:13px;font-family:inherit;padding:10px 14px;border-radius:9px;outline:none;transition:.15s}
  input:focus{border-color:#3b82f6}
  .btn{width:100%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;border:none;font-size:13px;font-weight:700;font-family:inherit;padding:12px;border-radius:10px;cursor:pointer;margin-top:6px}
  .btn:disabled{opacity:.6;cursor:wait}
  .msg{margin-top:14px;font-size:11px;text-align:center;padding:8px 12px;border-radius:8px;display:none}
  .msg.error{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);color:#f87171;display:block}
  .msg.success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#34d399;display:block}
  .expired-info{margin-top:16px;font-size:10px;color:#3a5575;text-align:center}
</style>
</head>

      <div class="logo-text">BERSAHAJA</div>

  <h2>Masuk ke Dashboard</h2>
  <p class="sub">Gunakan username dan password yang diberikan</p>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Masukkan username" autocomplete="username">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password">
  </div>
  <button class="btn" id="loginBtn" onclick="doLogin()">Masuk</button>
  <div class="msg" id="msg"></div>
  <div class="expired-info">Password memiliki masa berlaku. Hubungi admin jika tidak bisa masuk.</div>
</div>

<script>
const USERS = [
  {u:'Ayoindo',  p:'Ayo2026',   exp:'2026-12-31', aktif:true},
  {u:'Johan',    p:'Admin26', exp:'2026-12-31', aktif:true},
  {u:'Jeri',     p:'User26',    exp:'2026-06-30', aktif:true},
  {u:'Boy',      p:'User27',    exp:'2026-06-30', aktif:true},
];

window.onload = function(){
  if(sessionStorage.getItem('bersahaja_auth') === 'ok'){
    window.location.href = 'index_easy.html';
  }
}

function showMsg(text, type){
  var el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

function doLogin(){
  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value.trim();

  if(!username || !password){
    showMsg('Username dan password harus diisi', 'error');
    return;
  }

  var btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Memeriksa...';

  var today = new Date();
  today.setHours(0,0,0,0);

  var user = null;
  for(var i=0; i<USERS.length; i++){
    if(USERS[i].u === username && USERS[i].p === password){
      user = USERS[i];
      break;
    }
  }

  setTimeout(function(){
    if(!user){
      showMsg('Username atau password salah', 'error');
      btn.disabled = false;
      btn.textContent = 'Masuk';
      return;
    }
    if(!user.aktif){
      showMsg('Akun tidak aktif. Hubungi admin.', 'error');
      btn.disabled = false;
      btn.textContent = 'Masuk';
      return;
    }
    var exp = new Date(user.exp);
    exp.setHours(0,0,0,0);
    if(exp < today){
      showMsg('Password sudah expired. Hubungi admin.', 'error');
      btn.disabled = false;
      btn.textContent = 'Masuk';
      return;
    }
    showMsg('Login berhasil! Mengalihkan...', 'success');
    sessionStorage.setItem('bersahaja_auth', 'ok');
    sessionStorage.setItem('bersahaja_user', username);
    setTimeout(function(){ window.location.href = 'index_easy.html'; }, 800);
  }, 800);
}

document.addEventListener('keydown', function(e){
  if(e.key === 'Enter') doLogin();
});
</script>
