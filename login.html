<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BERSAHAJA — Login</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:#070e1b;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .card{
    background:#0c1625;
    border:1px solid #1b2e4a;
    border-radius:20px;
    padding:36px 32px;
    width:100%;
    max-width:380px;
    box-shadow:0 8px 40px rgba(0,0,0,0.5);
  }
  .logo{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:28px;
    justify-content:center;
  }
  .logo-icon{
    width:44px;height:44px;
    background:linear-gradient(135deg,#3b82f6,#8b5cf6);
    border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    font-size:22px;
  }
  .logo-text{font-size:20px;font-weight:700;color:#fff}
  .logo-sub{font-size:10px;color:#3a5575;margin-top:2px}
  h2{font-size:15px;font-weight:600;color:#dde8f8;text-align:center;margin-bottom:6px}
  .sub{font-size:11px;color:#3a5575;text-align:center;margin-bottom:24px}
  .field{margin-bottom:14px}
  label{display:block;font-size:10px;font-weight:600;color:#3a5575;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
  input{width:100%;background:#111e33;border:1px solid #1b2e4a;color:#dde8f8;font-size:13px;font-family:inherit;padding:10px 14px;border-radius:9px;outline:none;transition:.15s}
  input:focus{border-color:#3b82f6}
  .btn{width:100%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;border:none;font-size:13px;font-weight:700;font-family:inherit;padding:12px;border-radius:10px;cursor:pointer;margin-top:6px;transition:.15s}
  .btn:disabled{opacity:.6;cursor:wait}
  .msg{margin-top:14px;font-size:11px;text-align:center;padding:8px 12px;border-radius:8px;display:none}
  .msg.error{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);color:#f87171;display:block}
  .msg.success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#34d399;display:block}
  .expired-info{margin-top:16px;font-size:10px;color:#3a5575;text-align:center}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🌿</div>
    <div>
      <div class="logo-text">BERSAHAJA</div>
      <div class="logo-sub">bersama untuk flores yang sehat jiwa</div>
    </div>
  </div>
  <h2>Masuk ke Dashboard</h2>
  <p class="sub">Gunakan username dan password yang diberikan</p>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Masukkan username" autocomplete="username">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password">
  </div>
  <button class="btn" id="loginBtn" onclick="doLogin()">Masuk</button>
  <div class="msg" id="msg"></div>
  <div class="expired-info">Password memiliki masa berlaku. Hubungi admin jika tidak bisa masuk.</div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwN3qNaPVm3kELGepBbCPSsvQZkJp57xxeE6aOk9d3SRPLHMKPxFErsUdZBTxu5Z53xiA/exec';

window.onload = function(){
  if(sessionStorage.getItem('bersahaja_auth') === 'ok'){
    window.location.href = 'index_easy.html';
  }
}

function showMsg(text, type){
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

function doLogin(){
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if(!username || !password){
    showMsg('⚠️ Username dan password harus diisi', 'error');
    return;
  }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Memeriksa...';
  showMsg('', '');

  // Gunakan XMLHttpRequest — lebih kompatibel dengan Android WebView
  const xhr = new XMLHttpRequest();
  const url = API_URL + '?username=' + encodeURIComponent(username) + '&password=' + encodeURIComponent(password);
  
  xhr.open('GET', url, true);
  xhr.timeout = 15000;
  
  xhr.onreadystatechange = function(){
    if(xhr.readyState === 4){
      if(xhr.status === 200){
        try {
          const data = JSON.parse(xhr.responseText);
          if(data.status === 'ok'){
            showMsg('✅ Login berhasil! Mengalihkan...', 'success');
            sessionStorage.setItem('bersahaja_auth', 'ok');
            sessionStorage.setItem('bersahaja_user', username);
            setTimeout(function(){ window.location.href = 'index_easy.html'; }, 800);
          } else {
            showMsg('❌ ' + data.message, 'error');
            btn.disabled = false;
            btn.textContent = 'Masuk';
          }
        } catch(e) {
          showMsg('❌ Respons server tidak valid', 'error');
          btn.disabled = false;
          btn.textContent = 'Masuk';
        }
      } else {
        showMsg('❌ Server error: ' + xhr.status, 'error');
        btn.disabled = false;
        btn.textContent = 'Masuk';
      }
    }
  };

  xhr.ontimeout = function(){
    showMsg('❌ Koneksi timeout. Periksa internet.', 'error');
    btn.disabled = false;
    btn.textContent = 'Masuk';
  };

  xhr.onerror = function(){
    // Fallback: coba dengan mode no-cors via image trick
    showMsg('⚠️ Mencoba koneksi alternatif...', 'error');
    btn.disabled = false;
    btn.textContent = 'Masuk';
  };

  xhr.send();
}

document.addEventListener('keydown', function(e){
  if(e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
