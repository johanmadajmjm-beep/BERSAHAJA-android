name: Build BERSAHAJA Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/android @capacitor/filesystem
          npm install -g @capacitor/cli

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index_easy.html www/
          cp caregiver_easy.html www/
          cp oddp_easy.html www/
          cp *.css www/
          cp login.html www/

          # Fix PDF untuk Android di oddp dan caregiver
          for f in www/oddp_easy.html www/caregiver_easy.html; do
            python3 - "$f" << 'PYEOF'
import sys
with open(sys.argv[1], 'r', encoding='utf-8') as f:
    c = f.read()

old1 = "  const w=window.open('','_blank');"
new1 = "  const _isAndroid=/Android/i.test(navigator.userAgent);\n  const w=_isAndroid?null:window.open('','_blank');"
c = c.replace(old1, new1, 1)

old2 = "  w.document.write(html);\n  w.document.close();\n  showToast('\u2705 Laporan profesional disiapkan!');"
new2 = """  if(_isAndroid){
    const ov=document.createElement('div');
    ov.id='__rpt__';
    ov.style.cssText='position:fixed;inset:0;background:#f8f9fc;z-index:999999;overflow-y:auto;';
    const tb=document.createElement('div');
    tb.style.cssText='position:sticky;top:0;background:#1e3a8a;padding:10px 16px;display:flex;gap:10px;align-items:center;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.3);';
    tb.innerHTML='<button onclick="document.getElementById(\\'__rpt__\\').remove()" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">&#8592; Kembali</button><button onclick="window.print()" style="background:#10b981;color:#fff;border:none;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">&#128190; Simpan PDF</button><span style="color:rgba(255,255,255,.7);font-size:11px;flex:1;text-align:right;">Pilih Save as PDF saat print</span>';
    const ct=document.createElement('div');
    ct.innerHTML=html;
    ov.appendChild(tb);
    ov.appendChild(ct);
    document.body.appendChild(ov);
  } else {
    w.document.write(html);
    w.document.close();
  }
  showToast('\u2705 Laporan profesional disiapkan!');"""

c = c.replace(old2, new2, 1)

with open(sys.argv[1], 'w', encoding='utf-8') as f:
    f.write(c)
print("Done:", sys.argv[1])
PYEOF
          done

          cat > www/android.css << 'ANDROIDCSS'
          @media (max-width: 900px) {
            .nav {
              height: auto !important;
              flex-wrap: wrap !important;
              padding: 8px 12px !important;
              gap: 4px !important;
              position: fixed !important;
            }
            .nav-brand { flex: 0 0 auto !important; margin-right: auto !important; }
            .nav-links {
              display: flex !important;
              flex: 0 0 100% !important;
              order: 3 !important;
              overflow-x: auto !important;
              gap: 4px !important;
              padding-bottom: 2px !important;
              -webkit-overflow-scrolling: touch !important;
            }
            .nav-link {
              font-size: 10px !important;
              padding: 5px 8px !important;
              white-space: nowrap !important;
              flex-shrink: 0 !important;
            }
            .nav-right {
              flex: 0 0 100% !important;
              order: 4 !important;
              overflow-x: auto !important;
              gap: 4px !important;
              margin-left: 0 !important;
              -webkit-overflow-scrolling: touch !important;
            }
            .nav-btn {
              font-size: 9px !important;
              padding: 5px 8px !important;
              white-space: nowrap !important;
              flex-shrink: 0 !important;
            }
            .kpi-strip {
              position: relative !important;
              top: auto !important;
              left: 0 !important;
              width: 100% !important;
              margin-top: 120px !important;
            }
            .layout { margin-left: 0 !important; padding-top: 0 !important; }
            .sidebar {
              position: relative !important;
              top: auto !important;
              left: auto !important;
              width: 100% !important;
              height: auto !important;
              max-height: none !important;
              overflow: visible !important;
              padding: 12px !important;
              display: flex !important;
            }
            #mobileFilterBtn { display: none !important; }
            .kpi-grid { grid-template-columns: 1fr 1fr !important; }
            .two-col { grid-template-columns: 1fr !important; }
            .three-col { grid-template-columns: 1fr !important; }
          }
          ANDROIDCSS

          sed -i 's|</head>|<link rel="stylesheet" href="android.css"></head>|g' www/index_easy.html
          sed -i 's|</head>|<link rel="stylesheet" href="android.css"></head>|g' www/oddp_easy.html
          sed -i 's|</head>|<link rel="stylesheet" href="android.css"></head>|g' www/caregiver_easy.html

          cat > www/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0;url=login.html">
            <script>window.location.href='login.html';</script>
          </head>
          <body></body>
          </html>
          EOF

      - name: Capacitor add android
        run: npx cap add android || true

      - name: Capacitor sync
        run: npx cap sync android

      - name: Set orientation fullSensor
        run: |
          sed -i 's/android:screenOrientation="portrait"/android:screenOrientation="fullSensor"/g' \
            android/app/src/main/AndroidManifest.xml || true

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BERSAHAJA-Android-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
